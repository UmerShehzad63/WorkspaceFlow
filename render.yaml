services:
  - type: web
    name: workspaceflow-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      # ── Supabase ────────────────────────────────────────────────────────
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # ── Google OAuth ────────────────────────────────────────────────────
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      # ── OpenAI ──────────────────────────────────────────────────────────
      - key: OPENAI_API_KEY
        sync: false
      # ── Telegram ────────────────────────────────────────────────────────
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      # ── Stripe ──────────────────────────────────────────────────────────
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      # ── Email (SMTP) ─────────────────────────────────────────────────────
      - key: SMTP_EMAIL
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      # ── CORS — set to your Vercel URL after first deploy ─────────────────
      - key: ALLOWED_ORIGINS
        sync: false
