user www-data;
worker_processes auto;
pid /run/nginx.pid;

error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log /dev/stdout combined;

    sendfile           on;
    keepalive_timeout  65;
    client_max_body_size 10m;

    # Increase proxy buffers for SSR pages and API responses
    proxy_buffer_size       128k;
    proxy_buffers           4 256k;
    proxy_busy_buffers_size 256k;

    # Shared upstream definitions
    upstream nextjs  { server 127.0.0.1:3000; }
    upstream fastapi { server 127.0.0.1:8000; }

    server {
        listen 8080 default_server;
        server_name _;

        # ── FastAPI (Python) endpoints ───────────────────────────────────────
        # Handles: /health, /api/briefing, /api/briefing/schedule,
        #          /api/command, /api/send-preview, /api/request-automation,
        #          /api/support, /api/test, /api/telegram
        location = /health {
            proxy_pass         http://fastapi;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 10s;
        }

        location ~ ^/api/(briefing|command|send-preview|request-automation|support|test|telegram) {
            proxy_pass         http://fastapi;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;   # AI + Google API calls can be slow
        }

        # ── Next.js — everything else ────────────────────────────────────────
        # Handles: UI pages, /api/checkout, /api/portal,
        #          /api/webhooks/stripe, /auth/callback
        location / {
            proxy_pass         http://nextjs;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # Required for Next.js HMR websocket (unused in prod but harmless)
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_read_timeout 60s;
        }
    }
}
